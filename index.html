<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PayBill Software</title>
  <style>
    :root{--bg:#f4f7fb;--card:#fff;--text:#172033;--muted:#667085;--border:#d8e0ec;--primary:#2563eb;--green:#15803d;--red:#b91c1c;--amber:#b45309;--shadow:0 18px 45px rgba(15,23,42,.08);--radius:20px}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui,-apple-system,"Segoe UI",sans-serif;background:linear-gradient(135deg,#eef5ff,#f8fbff);color:var(--text)}
    .shell{max-width:1220px;margin:0 auto;padding:24px} .top{display:flex;justify-content:space-between;gap:16px;align-items:center;background:#fff;border:1px solid var(--border);border-radius:26px;padding:18px 22px;box-shadow:var(--shadow);position:sticky;top:14px;z-index:10}
    h1,h2,h3{margin:0 0 8px} p{margin:0;color:var(--muted);line-height:1.5} .brand h1{font-size:24px} .status{border-radius:999px;padding:9px 13px;font-size:13px;font-weight:800;background:#fff7ed;color:var(--amber);border:1px solid #fed7aa} .status.good{background:#eaf8ef;color:var(--green);border-color:#bbf7d0}
    .nav{display:flex;gap:10px;margin:20px 0;flex-wrap:wrap} button,.btn{border:1px solid var(--border);background:#fff;color:#1f2937;padding:10px 14px;border-radius:14px;font-weight:800;cursor:pointer} .nav button.active,.btn.primary{background:var(--primary);border-color:var(--primary);color:#fff} .btn.good{background:#16a34a;color:#fff;border-color:#16a34a} .btn.danger{background:#dc2626;color:#fff;border-color:#dc2626}
    .grid{display:grid;gap:18px} .two{grid-template-columns:repeat(2,minmax(0,1fr))} .three{grid-template-columns:repeat(3,minmax(0,1fr))} .card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow)} .metric{font-size:34px;font-weight:900;margin-top:8px}
    .field{display:flex;flex-direction:column;gap:6px;margin-bottom:12px} label{font-size:12px;font-weight:800;color:#344054;text-transform:uppercase;letter-spacing:.04em} input,select,textarea{width:100%;border:1px solid var(--border);padding:11px 12px;border-radius:12px;font:inherit}
    .toolbar{display:flex;justify-content:space-between;align-items:flex-end;gap:14px;flex-wrap:wrap;margin-bottom:16px} .toolbar-left,.toolbar-right{display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap} .toolbar .field{margin:0;min-width:180px}
    .notice{padding:13px 14px;border-radius:14px;border:1px solid var(--border);background:#f8fafc;color:#475569;line-height:1.5;font-size:14px} .notice.good{background:#eaf8ef;color:var(--green);border-color:#bbf7d0} .notice.error{background:#fef2f2;color:var(--red);border-color:#fecaca} .notice.warn{background:#fff7ed;color:var(--amber);border-color:#fed7aa}
    .table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:16px} table{width:100%;border-collapse:collapse;min-width:820px;background:#fff} th,td{padding:11px 12px;border-bottom:1px solid #e7edf5;text-align:left;font-size:14px} th{background:#f8fafc;color:#475569;font-size:12px;text-transform:uppercase} .num{text-align:right;font-variant-numeric:tabular-nums} .actions{display:flex;gap:8px;flex-wrap:wrap} .small{padding:7px 10px;border-radius:10px;font-size:12px} .footer{text-align:center;color:var(--muted);font-size:13px;margin:28px 0 8px}
    @media(max-width:760px){.shell{padding:14px}.top,.toolbar,.toolbar-left,.toolbar-right{align-items:stretch;flex-direction:column}.two,.three{grid-template-columns:1fr}button,.btn{width:100%}}
  </style>
</head>
<body>
  <div class="shell">
    <header class="top"><div class="brand"><h1>PayBill Software</h1><p>GitHub frontend + Apps Script backend + Google Sheet database</p></div><div id="connectionStatus" class="status">Backend URL required</div></header>
    <nav class="nav" id="nav"></nav><main id="view"></main><div class="footer">PayBill Software v0.4 APTC Form 47</div>
  </div>
<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyo7vg8kpVUzkQWDwHPCbwnP42D3y4ZMqixg20bqzoG5WYlvWDdJXSOQ1vH9w5pDJ-2/exec";
const API_KEY = "";
const tabs=[["dashboard","Dashboard"],["employees","Employees"],["payroll","Payroll"],["schedules","Schedules"],["forms","Forms"],["reports","Reports"],["settings","Settings"]];
const state={activeTab:"dashboard",loading:false,master:{},employees:[],payrollRows:[],payrollTotals:{gross:0,deductions:0,net:0},scheduleRows:[],scheduleTotal:0,scheduleTitle:"",form47:null,reports:[],lastMessage:"",lastError:""};
function isApiConfigured(){return API_URL&&!API_URL.includes("PASTE_APPS_SCRIPT_WEB_APP_URL_HERE")}
function statusMsg(m,t="warn"){const e=document.getElementById("connectionStatus");e.textContent=m;e.className="status "+(t==="good"?"good":"")}
function msg(m,type=""){state.lastMessage=m||"";state.lastError=type==="error"?m:"";render()}
function switchTab(t){state.activeTab=t;render()}
function jsonp(action,params={}){return new Promise((resolve,reject)=>{if(!isApiConfigured())return reject(new Error("Apps Script Web App URL is not configured in index.html."));const cb="__paybillCb_"+Date.now()+"_"+Math.floor(Math.random()*1e5);const url=new URL(API_URL);url.searchParams.set("action",action);url.searchParams.set("callback",cb);if(API_KEY)url.searchParams.set("apiKey",API_KEY);Object.entries(params).forEach(([k,v])=>{if(v!==undefined&&v!==null)url.searchParams.set(k,String(v))});const s=document.createElement("script");const timer=setTimeout(()=>{cleanup();reject(new Error("Backend request timed out."))},30000);function cleanup(){clearTimeout(timer);try{delete window[cb]}catch(e){window[cb]=undefined}s.remove()}window[cb]=(r)=>{cleanup();if(!r||r.ok===false)return reject(new Error(r?.error||"Backend request failed."));resolve(r)};s.onerror=()=>{cleanup();reject(new Error("Unable to reach backend. Check Web App URL and deployment access."))};s.src=url.toString();document.body.appendChild(s)})}
function enc(o){return btoa(unescape(encodeURIComponent(JSON.stringify(o))))} function esc(v){return String(v??"").replace(/[&<>"']/g,s=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"}[s]))} function n(v){const x=Number(v);return Number.isFinite(x)?x:0} function money(v){return n(v).toLocaleString("en-IN",{maximumFractionDigits:0})}
function gross(e){return n(e.basicPay)+n(e.da)+n(e.hra)} function ded(e){return n(e.gpf)+n(e.apgli)+n(e.gis)+n(e.pt)+n(e.it)+n(e.ehs)+n(e.ewf)} function net(e){return gross(e)-ded(e)} function currentMonth(){return new Date().toLocaleString("en-IN",{month:"long",year:"numeric"})}
async function checkBackend(){try{const r=await jsonp("ping");statusMsg("Connected · "+(r.version||"Backend ready"),"good")}catch(e){statusMsg("Backend not connected")}}
async function setupDatabase(){try{state.loading=true;render();const r=await jsonp("setup");await loadData(false);msg(r.message||"Database setup completed.","good")}catch(e){msg(e.message,"error")}finally{state.loading=false;render()}}
async function loadData(show=true){try{state.loading=true;render();const r=await jsonp("getData");state.master=r.master||{};state.employees=r.employees||[];state.reports=r.reports||[];statusMsg("Connected","good");if(show)msg("Data loaded from Google Sheet.","good")}catch(e){msg(e.message,"error")}finally{state.loading=false;render()}}
async function saveEmployee(){const e={cfmsId:cfmsId.value.trim(),name:empName.value.trim(),designation:designation.value.trim(),basicPay:n(basicPay.value),da:n(da.value),hra:n(hra.value),gpf:n(gpf.value),apgli:n(apgli.value),gis:n(gis.value),pt:n(pt.value),it:n(it.value),ehsSlab:ehsSlab.value,ehs:n(ehs.value),bankAccount:bankAccount.value.trim(),remarks:remarks.value.trim()};if(!e.cfmsId||!e.name)return msg("CFMS ID and Employee Name are required.","error");try{state.loading=true;render();const r=await jsonp("saveEmployee",{payload:enc(e)});await loadData(false);msg(r.message||"Employee saved.","good")}catch(err){msg(err.message,"error")}finally{state.loading=false;render()}}
async function deleteEmployee(id){if(!confirm("Delete employee with CFMS ID "+id+"?"))return;try{state.loading=true;render();const r=await jsonp("deleteEmployee",{cfmsId:id});await loadData(false);msg(r.message||"Employee deleted.","good")}catch(e){msg(e.message,"error")}finally{state.loading=false;render()}}
function editEmployee(id){const e=state.employees.find(x=>String(x.cfmsId)===String(id));if(!e)return;switchTab("employees");setTimeout(()=>{cfmsId.value=e.cfmsId||"";empName.value=e.name||"";designation.value=e.designation||"";basicPay.value=e.basicPay||"";da.value=e.da||"";hra.value=e.hra||"";gpf.value=e.gpf||"";apgli.value=e.apgli||"";gis.value=e.gis||"";pt.value=e.pt||"";it.value=e.it||"";ehsSlab.value=e.ehsSlab||"EHS SLAB-C";ehs.value=e.ehs||"";bankAccount.value=e.bankAccount||"";remarks.value=e.remarks||""},50)}
function updateEhsFromSlab(){ehs.value=ehsSlab.value==="EHS SLAB-C"?300:225}
async function loadReports(show=true){const m=document.getElementById("reportMonth")?.value||currentMonth();try{state.loading=true;render();const r=await jsonp("getReports",{month:m});state.reports=r.reports||[];if(show)msg("Reports checked from Google Drive.","good")}catch(e){msg(e.message,"error")}finally{state.loading=false;render()}}
async function generateSampleReport(){const m=document.getElementById("reportMonth")?.value||currentMonth();try{state.loading=true;render();const r=await jsonp("generateSampleReport",{month:m});await loadReports(false);msg(r.message||"Sample report generated.","good");if(r.url)window.open(r.url,"_blank")}catch(e){msg(e.message,"error")}finally{state.loading=false;render()}}
async function loadPayroll(show=true){const m=document.getElementById("payrollMonth")?.value||currentMonth();try{state.loading=true;render();const r=await jsonp("getPayroll",{month:m});state.payrollRows=r.rows||[];state.payrollTotals=r.totals||{gross:0,deductions:0,net:0};if(show)msg("Payroll loaded for "+m+".","good")}catch(e){msg(e.message,"error")}finally{state.loading=false;render()}}
async function savePayrollSnapshot(){const m=document.getElementById("payrollMonth")?.value||currentMonth();try{state.loading=true;render();const r=await jsonp("savePayrollSnapshot",{month:m});state.payrollRows=r.rows||[];state.payrollTotals=r.totals||{gross:0,deductions:0,net:0};msg(r.message||"Payroll snapshot saved.","good")}catch(e){msg(e.message,"error")}finally{state.loading=false;render()}}
async function generatePayrollPdf(){const m=document.getElementById("payrollMonth")?.value||currentMonth();try{state.loading=true;render();const r=await jsonp("generatePayrollPdf",{month:m});await loadReports(false);msg(r.message||"Payroll PDF generated.","good");if(r.url)window.open(r.url,"_blank")}catch(e){msg(e.message,"error")}finally{state.loading=false;render()}}
async function loadSchedule(show=true){const m=document.getElementById("scheduleMonth")?.value||currentMonth();const t=document.getElementById("scheduleType")?.value||"gpf";try{state.loading=true;render();const r=await jsonp("getSchedule",{month:m,type:t});state.scheduleRows=r.rows||[];state.scheduleTotal=r.total||0;state.scheduleTitle=r.title||"Deduction Schedule";if(show)msg((r.title||"Schedule")+" loaded for "+m+".","good")}catch(e){msg(e.message,"error")}finally{state.loading=false;render()}}
async function generateSchedulePdf(){const m=document.getElementById("scheduleMonth")?.value||currentMonth();const t=document.getElementById("scheduleType")?.value||"gpf";try{state.loading=true;render();const r=await jsonp("generateSchedulePdf",{month:m,type:t});await loadReports(false);msg(r.message||"Schedule PDF generated.","good");if(r.url)window.open(r.url,"_blank")}catch(e){msg(e.message,"error")}finally{state.loading=false;render()}}
async function generateAllDeductionSchedulesPdf(){const m=document.getElementById("scheduleMonth")?.value||currentMonth();try{state.loading=true;render();const r=await jsonp("generateAllDeductionSchedulesPdf",{month:m});await loadReports(false);msg(r.message||"All Deduction Schedules PDF generated.","good");if(r.url)window.open(r.url,"_blank")}catch(e){msg(e.message,"error")}finally{state.loading=false;render()}}
async function loadForm47(){const m=document.getElementById("form47Month")?.value||currentMonth();try{state.loading=true;render();const r=await jsonp("getForm47",{month:m});state.form47=r.form47||null;msg("APTC Form 47 summary loaded for "+m+".","good")}catch(e){msg(e.message,"error")}finally{state.loading=false;render()}}
async function generateForm47Pdf(){const m=document.getElementById("form47Month")?.value||currentMonth();try{state.loading=true;render();const r=await jsonp("generateForm47Pdf",{month:m});state.form47=r.form47||state.form47;await loadReports(false);msg(r.message||"APTC Form 47 PDF generated.","good");if(r.url)window.open(r.url,"_blank")}catch(e){msg(e.message,"error")}finally{state.loading=false;render()}}
function renderNav(){nav.innerHTML=tabs.map(([id,l])=>`<button class="${state.activeTab===id?"active":""}" onclick="switchTab('${id}')">${l}</button>`).join("")}
function alertView(){if(!state.lastMessage)return"";return`<div class="notice ${state.lastError?"error":"good"}" style="margin-bottom:16px">${esc(state.lastMessage)}</div>`}
function dashboardView(){const g=state.employees.reduce((s,e)=>s+gross(e),0),d=state.employees.reduce((s,e)=>s+ded(e),0);return `${alertView()}<div class="grid three"><div class="card"><h3>Employees</h3><p>Total employees</p><div class="metric">${state.employees.length}</div></div><div class="card"><h3>Gross Pay</h3><p>Loaded employees</p><div class="metric">₹${money(g)}</div></div><div class="card"><h3>Net Pay</h3><p>After deductions</p><div class="metric">₹${money(g-d)}</div></div></div><div class="card" style="margin-top:18px"><div class="toolbar"><div><h2>Backend Setup</h2><p>Create required sheets and verify Drive connection.</p></div><div class="toolbar-right"><button class="btn primary" onclick="setupDatabase()">Setup Database</button><button class="btn good" onclick="loadData()">Load Data</button></div></div><div class="notice warn">First deploy <b>code.gs</b> as Apps Script Web App, then paste the Web App URL inside <b>index.html</b>.</div></div>`}
function employeesView(){return `${alertView()}<div class="grid two"><div class="card"><h2>Employee Entry</h2><p style="margin-bottom:16px">Add or update employee pay details.</p><div class="grid two"><div class="field"><label>CFMS ID</label><input id="cfmsId"></div><div class="field"><label>Employee Name</label><input id="empName"></div></div><div class="field"><label>Designation</label><input id="designation"></div><div class="grid three"><div class="field"><label>Basic Pay</label><input id="basicPay" type="number"></div><div class="field"><label>DA</label><input id="da" type="number"></div><div class="field"><label>HRA</label><input id="hra" type="number"></div></div><div class="grid three"><div class="field"><label>GPF</label><input id="gpf" type="number"></div><div class="field"><label>APGLI</label><input id="apgli" type="number"></div><div class="field"><label>GIS</label><input id="gis" type="number"></div></div><div class="grid three"><div class="field"><label>PT</label><input id="pt" type="number"></div><div class="field"><label>IT</label><input id="it" type="number"></div><div class="field"><label>EHS Slab</label><select id="ehsSlab" onchange="updateEhsFromSlab()"><option>EHS SLAB-A</option><option>EHS SLAB-B</option><option selected>EHS SLAB-C</option></select></div></div><div class="grid three"><div class="field"><label>EHS Amount</label><input id="ehs" type="number" value="300"></div><div class="field"><label>EWF / CMRF</label><input id="ewf" type="number" value="0"></div><div class="field"><label>Bank Account</label><input id="bankAccount"></div></div><div class="field"><label>Remarks</label><textarea id="remarks" rows="2"></textarea></div><button class="btn primary" onclick="saveEmployee()">Save Employee</button></div><div class="card"><div class="toolbar"><div><h2>Employee Summary</h2><p>Calculated from current employee master.</p></div><button class="btn good" onclick="loadData()">Refresh</button></div>${employeesTable()}</div></div>`}
function employeesTable(){if(!state.employees.length)return`<div class="notice warn">No employees found. Click Setup Database and add employees.</div>`;return`<div class="table-wrap"><table><thead><tr><th>CFMS ID</th><th>Name</th><th>Designation</th><th class="num">Gross</th><th class="num">Deduction</th><th class="num">Net</th><th>Action</th></tr></thead><tbody>${state.employees.map(e=>`<tr><td>${esc(e.cfmsId)}</td><td>${esc(e.name)}</td><td>${esc(e.designation)}</td><td class="num">₹${money(gross(e))}</td><td class="num">₹${money(ded(e))}</td><td class="num">₹${money(net(e))}</td><td><div class="actions"><button class="btn small" onclick="editEmployee('${esc(e.cfmsId)}')">Edit</button><button class="btn small danger" onclick="deleteEmployee('${esc(e.cfmsId)}')">Delete</button></div></td></tr>`).join("")}</tbody></table></div>`}
function payrollView(){const t=state.payrollTotals||{gross:0,deductions:0,net:0};return `${alertView()}<div class="grid three"><div class="card"><h3>Payroll Employees</h3><p>Employees included in selected month</p><div class="metric">${state.payrollRows.length}</div></div><div class="card"><h3>Total Gross</h3><p>Basic + DA + HRA</p><div class="metric">₹${money(t.gross)}</div></div><div class="card"><h3>Total Net</h3><p>Gross minus deductions</p><div class="metric">₹${money(t.net)}</div></div></div><div class="card" style="margin-top:18px"><div class="toolbar"><div><h2>Payroll Sheet</h2><p>Load, save and generate monthly payroll sheet from employee master.</p></div><div class="toolbar-right"><div class="field"><label>Month</label><input id="payrollMonth" value="${currentMonth()}"></div><button class="btn primary" onclick="loadPayroll()">Load Payroll</button><button class="btn good" onclick="savePayrollSnapshot()">Save Snapshot</button><button class="btn good" onclick="generatePayrollPdf()">Generate Payroll PDF</button></div></div>${payrollTable()}</div>`}
function payrollTable(){if(!state.payrollRows.length)return`<div class="notice warn">No payroll loaded. Click Load Payroll after adding employees.</div>`;return`<div class="table-wrap"><table><thead><tr><th>S.No</th><th>CFMS ID</th><th>Name</th><th>Designation</th><th class="num">Basic</th><th class="num">DA</th><th class="num">HRA</th><th class="num">Gross</th><th class="num">Deduction</th><th class="num">Net</th></tr></thead><tbody>${state.payrollRows.map((r,i)=>`<tr><td>${i+1}</td><td>${esc(r.cfmsId)}</td><td>${esc(r.name)}</td><td>${esc(r.designation)}</td><td class="num">₹${money(r.basicPay)}</td><td class="num">₹${money(r.da)}</td><td class="num">₹${money(r.hra)}</td><td class="num">₹${money(r.gross)}</td><td class="num">₹${money(r.deductions)}</td><td class="num">₹${money(r.net)}</td></tr>`).join("")}</tbody></table></div>`}
function schedulesView(){return `${alertView()}<div class="card"><div class="toolbar"><div><h2>Deduction Schedules</h2><p>Generate individual deduction schedules and all deduction schedules PDF.</p></div><div class="toolbar-right"><div class="field"><label>Month</label><input id="scheduleMonth" value="${currentMonth()}"></div><div class="field"><label>Schedule</label><select id="scheduleType"><option value="gpf">GPF Schedule</option><option value="apgli">APGLI Schedule</option><option value="gis">GIS Schedule</option><option value="pt">Professional Tax Schedule</option><option value="it">Income Tax Schedule</option><option value="ehs">EHS Schedule</option><option value="ewf">EWF / CMRF Schedule</option></select></div><button class="btn primary" onclick="loadSchedule()">Load Schedule</button><button class="btn good" onclick="generateSchedulePdf()">Generate PDF</button><button class="btn good" onclick="generateAllDeductionSchedulesPdf()">All Schedules PDF</button></div></div><div class="grid three" style="margin-bottom:16px"><div class="card" style="box-shadow:none"><h3>${esc(state.scheduleTitle||"Selected Schedule")}</h3><p>Loaded schedule</p></div><div class="card" style="box-shadow:none"><h3>Employees</h3><p>Employees with deduction</p><div class="metric">${state.scheduleRows.length}</div></div><div class="card" style="box-shadow:none"><h3>Total</h3><p>Deduction total</p><div class="metric">₹${money(state.scheduleTotal)}</div></div></div>${scheduleTable()}</div>`}
function scheduleTable(){if(!state.scheduleRows.length)return`<div class="notice warn">No schedule loaded or no deductions available for selected schedule.</div>`;return`<div class="table-wrap"><table><thead><tr><th>S.No</th><th>CFMS ID</th><th>Name</th><th>Designation</th><th>Reference</th><th class="num">Amount</th></tr></thead><tbody>${state.scheduleRows.map((r,i)=>`<tr><td>${i+1}</td><td>${esc(r.cfmsId)}</td><td>${esc(r.name)}</td><td>${esc(r.designation)}</td><td>${esc(r.reference||"")}</td><td class="num">₹${money(r.amount)}</td></tr>`).join("")}</tbody></table></div>`}
function formsView(){const f=state.form47||{};return `${alertView()}<div class="card"><div class="toolbar"><div><h2>APTC Form 47</h2><p>Generate treasury bill form using current employee payroll totals.</p></div><div class="toolbar-right"><div class="field"><label>Month</label><input id="form47Month" value="${currentMonth()}"></div><button class="btn primary" onclick="loadForm47()">Load Summary</button><button class="btn good" onclick="generateForm47Pdf()">Generate Form 47 PDF</button></div></div><div class="grid three" style="margin-bottom:16px"><div class="card" style="box-shadow:none"><h3>Employees</h3><p>Included in bill</p><div class="metric">${f.employeeCount||0}</div></div><div class="card" style="box-shadow:none"><h3>Gross</h3><p>Total bill amount</p><div class="metric">₹${money(f.gross||0)}</div></div><div class="card" style="box-shadow:none"><h3>Net</h3><p>Net payable</p><div class="metric">₹${money(f.net||0)}</div></div></div>${form47SummaryTable(f)}</div>`}
function form47SummaryTable(f){if(!f||!f.month)return`<div class="notice warn">No Form 47 summary loaded. Click Load Summary.</div>`;return`<div class="table-wrap"><table><tbody><tr><th>Month</th><td>${esc(f.month)}</td></tr><tr><th>Office</th><td>${esc(f.officeName||"Government Degree College, Cheepurupalli")}</td></tr><tr><th>DDO Designation</th><td>${esc(f.ddoDesignation||"Principal")}</td></tr><tr><th>Total Gross</th><td class="num">₹${money(f.gross)}</td></tr><tr><th>Total Deductions</th><td class="num">₹${money(f.deductions)}</td></tr><tr><th>Net Payable</th><td class="num">₹${money(f.net)}</td></tr></tbody></table></div>`}
function reportsView(){return `${alertView()}<div class="card"><div class="toolbar"><div><h2>Reports</h2><p>Reports are stored in Google Drive.</p></div><div class="toolbar-right"><div class="field"><label>Month</label><input id="reportMonth" value="${currentMonth()}"></div><button class="btn primary" onclick="loadReports()">Search Reports</button><button class="btn good" onclick="generateSampleReport()">Generate Sample PDF</button></div></div>${reportsTable()}</div>`}
function reportsTable(){if(!state.reports.length)return`<div class="notice warn">Reports are not available for the selected month and year.</div>`;return`<div class="table-wrap"><table><thead><tr><th>Report Name</th><th>Updated</th><th>Action</th></tr></thead><tbody>${state.reports.map(f=>`<tr><td>${esc(f.name)}</td><td>${esc(f.updated||"")}</td><td><div class="actions"><button class="btn small primary" onclick="window.open('${f.url}','_blank')">Open</button><button class="btn small" onclick="window.open('${f.downloadUrl}','_blank')">Download</button></div></td></tr>`).join("")}</tbody></table></div>`}
function settingsView(){return `${alertView()}<div class="card"><h2>Settings</h2><p style="margin-bottom:14px">This GitHub frontend needs the Apps Script Web App backend URL.</p><div class="notice ${isApiConfigured()?"good":"warn"}"><b>Backend URL Status:</b><br>${isApiConfigured()?"API_URL is configured in index.html.":"API_URL is not configured yet. Deploy code.gs and paste the URL in index.html."}</div><div style="margin-top:16px" class="notice"><b>Database:</b> Google Sheet ID is configured inside backend code.gs.<br><br><b>Reports Folder:</b> Google Drive Folder ID is configured inside backend code.gs.</div></div>`}
function render(){renderNav();if(!isApiConfigured())statusMsg("Backend URL required");const v=document.getElementById("view");if(state.loading){v.innerHTML=`<div class="card"><h2>Please wait...</h2><p>Processing request.</p></div>`;return} if(state.activeTab==="dashboard")v.innerHTML=dashboardView(); if(state.activeTab==="employees")v.innerHTML=employeesView(); if(state.activeTab==="payroll")v.innerHTML=payrollView(); if(state.activeTab==="schedules")v.innerHTML=schedulesView(); if(state.activeTab==="forms")v.innerHTML=formsView(); if(state.activeTab==="reports")v.innerHTML=reportsView(); if(state.activeTab==="settings")v.innerHTML=settingsView()}
render();checkBackend();
</script>
</body>
</html>
